<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site A - WebView Storage Experiment</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.4; }
    iframe { border: 1px solid #999; width: 100%; height: 540px; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Site A</h1>
  <p>This page embeds Site C as a third-party iframe.</p>
  <pre id="meta"></pre>
  <iframe id="site-c-frame" title="Site C storage frame"></iframe>
  <script>
    const params = new URLSearchParams(location.search);
    const siteC = params.get("c") || "https://sitec-t9c1.onrender.com/";
    const frameUrl = new URL(siteC);
    frameUrl.searchParams.set("embedder_site", "site_a");
    frameUrl.searchParams.set("embedder_origin", location.origin);
    for (const [key, value] of params.entries()) {
      if (!frameUrl.searchParams.has(key)) frameUrl.searchParams.set(key, value);
    }
    document.getElementById("site-c-frame").src = frameUrl.toString();
    document.getElementById("meta").textContent = JSON.stringify({
      site: "A",
      href: location.href,
      origin: location.origin,
      siteCFrame: frameUrl.toString()
    }, null, 2);
    window.addEventListener("message", (event) => {
      console.log("Site A received iframe result", event.data);
    });
  </script>
</body>
</html>
